server {
    listen 443 ssl;
    server_name vpn1.addyops.fun vpn1.addyops.fun;
    ssl_certificate /etc/nginx/pritunl-nginx.crt;
    ssl_certificate_key /etc/nginx/pritunl-nginx.key;
    large_client_header_buffers 4 32k;
    client_header_buffer_size 32k;

    location = /login {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>VPN Access</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;-webkit-font-smoothing:antialiased}.card{width:360px;background:#fff;border-radius:20px;padding:48px 40px 40px;text-align:center}.icon-wrap{width:56px;height:56px;background:#000;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}h1{font-size:22px;font-weight:600;color:#000;letter-spacing:-0.4px;margin-bottom:8px}p.sub{font-size:14px;color:#444;line-height:1.55;margin-bottom:32px;font-weight:400}.btn{display:block;background:#000;color:#fff;text-decoration:none;padding:13px;border-radius:10px;font-size:15px;font-weight:500;letter-spacing:-0.2px;transition:opacity 0.15s}.btn:hover{opacity:0.75}.divider{height:1px;background:#f0f0f0;margin:24px 0}p.foot{font-size:12px;color:#666;letter-spacing:0}</style></head><body><div class="card"><div class="icon-wrap"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="11" width="12" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/><circle cx="12" cy="15.5" r="1.2" fill="#fff" stroke="none"/></svg></div><h1>VPN Access</h1><p class="sub">Sign in with your organization<br>account to get your VPN profile</p><a href="/sso" class="btn">Sign in with SSO</a><div class="divider"></div><p class="foot">Secured by AWS IAM Identity Center</p></div></body></html>';
    }

    location = /sso {
        return 302 https://vpn1.addyops.fun:8443/sso/callback;
    }

    location = /settings {
        proxy_pass https://127.0.0.1:9443;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Validated true;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun$request_uri;
    }
    location = /saml/update {
        proxy_pass http://127.0.0.1:9756;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Validated true;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun$request_uri;
    }
    location /saml/ {
        proxy_pass http://127.0.0.1:9756;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun$request_uri;
    }
    location ~ ^/domain-routes {
        proxy_pass http://127.0.0.1:9756;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun$request_uri;
    }

    location = /saml-settings {
        proxy_pass http://127.0.0.1:9756;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun/saml-settings;
    }
    location = /pritunl-admin {
        proxy_pass http://127.0.0.1:9756/login;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Validated true;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun/login;
    }

    location = /sso/callback {
        proxy_pass http://127.0.0.1:9756;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Validated true;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun:8443$request_uri;
    }


    # Pritunl API - proxied directly to Flask with auth headers preserved
    location ~ ^/user/ {
        proxy_pass http://127.0.0.1:9756;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Validated true;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun$request_uri;
    }

    location = /key/request {
        proxy_pass http://127.0.0.1:9756;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Validated true;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun$request_uri;
    }
    location ~ ^/key/ {
        proxy_pass https://127.0.0.1:9443;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Validated true;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun$request_uri;
    }
    location ~ ^/data/ {
        proxy_pass http://127.0.0.1:9756;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Validated true;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun$request_uri;
    }

    location ~ ^/key/ {
        proxy_pass https://127.0.0.1:9443;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun$request_uri;
    }

    location / {
        proxy_pass https://127.0.0.1:9443;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host vpn1.addyops.fun;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header PR-Forwarded-Url https://vpn1.addyops.fun$request_uri;
    }
}

